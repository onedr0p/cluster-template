---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "E2E"

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  validate-invalid:
    if: ${{ github.repository == 'onedr0p/cluster-template' }}
    name: reject-invalid (${{ matrix.fixture }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - overlapping-cidrs
          - duplicate-gateway-addrs
          - duplicate-node-names
          - reserved-node-name
          - bad-mac-address
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Assert schema rejects ${{ matrix.fixture }}.toml
        run: |
          fixture=./.github/tests/invalid/${{ matrix.fixture }}.toml
          schema=./template/resources/config.schema.cue
          if cue export "$fixture" "$schema" --out yaml >/dev/null 2>&1; then
            echo "::error::schema accepted invalid fixture ${{ matrix.fixture }} (expected rejection)"
            exit 1
          fi
          echo "schema correctly rejected ${{ matrix.fixture }}"
          # Also surface the actual error message in the log for debuggability.
          cue export "$fixture" "$schema" --out yaml || true

  validate-valid:
    if: ${{ github.repository == 'onedr0p/cluster-template' }}
    name: accept-valid (${{ matrix.fixture }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        fixture:
          - public
          - private
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          experimental: true
          install_args: --locked

      - name: Run init recipe
        run: just init

      - name: Prepare files
        run: |
          cp ./.github/tests/valid/${{ matrix.fixture }}.toml cluster.toml
          echo '{"AccountTag":"fake","TunnelSecret":"fake","TunnelID":"fake"}' > cloudflare-tunnel.json
          touch kubeconfig

      - name: Run configure recipe
        run: just configure

      - name: Install flate
        uses: home-operations/flate/action@0fc37fae10cf3c265294f6adebc6d6c100c74ea5 # v0.4.10
        with:
          base: ""

      - name: Run flate test
        run: flate test all -p ./kubernetes/flux/cluster

      - name: Dry run bootstrap talos recipe
        run: just --dry-run bootstrap talos

      - name: Create talos secret
        run: just bootstrap talos-secret

      - name: Create talos config
        run: just bootstrap talos-config

      - name: Dry run bootstrap apps recipe
        run: just --dry-run bootstrap apps

      - name: Run reset recipe
        run: yes | just template reset

      - name: Run tidy recipe
        run: yes | just template tidy
