[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true } # required:template
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
JUST_UNSTABLE = "1"

[tools]
"python" = "3.14.5" # required:template
"uv" = "0.11.14" # required:template
"pipx" = "1.12.0" # required:template
"pipx:makejinja" = "2.8.2" # required:template
"aqua:budimanjojo/talhelper" = "3.1.10"
"aqua:casey/just" = "1.51.0"
"aqua:charmbracelet/gum" = "0.17.0"
"aqua:chmln/sd" = "1.1.0" # required:template
"aqua:cilium/cilium-cli" = "0.19.3"
"aqua:cli/cli" = "2.92.0"
"aqua:cloudflare/cloudflared" = "2026.5.0"
"aqua:cue-lang/cue" = "0.16.1" # required:template
"aqua:FiloSottile/age" = "1.3.1"
"aqua:fluxcd/flux2" = "2.8.7"
"aqua:getsops/sops" = "3.13.0"
"aqua:helm/helm" = "4.1.4"
"aqua:helmfile/helmfile" = "1.5.1"
"aqua:jqlang/jq" = "1.8.1"
"aqua:kubernetes-sigs/kustomize" = "5.7.1"
"aqua:kubernetes/kubernetes/kubectl" = "1.36.1"
"aqua:mikefarah/yq" = "4.53.2"
"aqua:siderolabs/talos" = "1.13.2"
"aqua:yannh/kubeconform" = "0.7.0"
