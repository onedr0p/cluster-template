[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/talosconfig"
JUST_UNSTABLE = "1"

[tools]
uv = "0.11.30"                      # required:template
age = "1.3.1"
cloudflared = "2026.7.2"
flux2 = "2.9.2"
gh = "2.96.0"
gum = "0.17.0"
helm = "4.2.3"
helmfile = "1.7.1"
jq = "1.8.2"
just = "1.57.0"
kubeconform = "0.8.0"
kubectl = "1.36.2"
kustomize = "5.8.1"
lefthook = "2.1.10"
oxfmt = "0.59.0"
sd = "1.1.0"                        # required:template
sops = "3.13.2"
talosctl = "1.13.7"
"github:postfinance/topf" = "0.4.2"
yq = "4.53.3"
zizmor = "1.27.0"

[hooks]
postinstall = "lefthook install"
